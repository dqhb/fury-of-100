<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1000-Level Boss Run</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; user-select: none; }
        canvas { display: block; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; box-sizing: border-box; text-transform: uppercase;
        }

        #top-bar { display: flex; justify-content: space-between; align-items: flex-start; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        h1 { margin: 0; font-size: 2.5rem; color: #ff8800; letter-spacing: 2px; text-shadow: 0 0 20px #ff8800;}
        #level-display { font-size: 1.5rem; color: #facc15; text-shadow: 0 0 10px #facc15;}

        #menu, #victory {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto; z-index: 10;
        }

        #menu h2, #victory h2 { font-size: 4rem; color: #ff8800; margin: 0 0 20px 0; text-shadow: 0 0 20px #ff8800; }
        #victory h2 { color: #4ade80; text-shadow: 0 0 30px #4ade80; font-size: 3rem; text-align: center; }
        p { color: #94a3b8; font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 1px; }
        .controls-text { color: #fff; font-weight: bold; }

        button {
            background: #ff8800; color: #0f172a; border: none; padding: 15px 40px;
            font-size: 1.5rem; font-weight: bold; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 0 15px #ff8800; transition: transform 0.1s;
        }
        button:hover { transform: scale(1.05); background: #ffaa33; }
        
        #victory { display: none; z-index: 20; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="top-bar">
            <h1>Citrus Doom</h1>
            <div id="level-display">Level 1 / 1000</div>
        </div>
    </div>

    <div id="menu">
        <h2>THE ORANGE WATCHES</h2>
        <p><span class="controls-text">A / D</span> Move | <span class="controls-text">W / SPACE</span> Single Jump | Dodge the <span style="color:#ef4444; font-weight:bold;">Red Lasers</span></p>
        <button id="start-btn">BEGIN RUN</button>
    </div>

    <div id="victory">
        <h2>THE ORANGE IS DEFEATED!</h2>
        <p>You survived all 1000 levels.</p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const startBtn = document.getElementById('start-btn');
        const levelUI = document.getElementById('level-display');
        const victoryScreen = document.getElementById('victory');

        let isPlaying = false;
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        startBtn.addEventListener('click', () => {
            menu.style.display = 'none';
            isPlaying = true;
            buildLevel(currentLevel);
            gameLoop();
        });

        const keys = { a: false, d: false, w: false, space: false };
        window.addEventListener('keydown', e => { 
            let key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = true; 
            if(e.code === 'Space') keys.space = true; 
        });
        window.addEventListener('keyup', e => { 
            let key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = false; 
            if(e.code === 'Space') keys.space = false; 
        });

        let currentLevel = 1;
        let platforms = [];
        let lasers = [];
        let cameraX = 0;
        let cameraYOffset = 0;

        const player = {
            x: 0, y: 0, w: 24, h: 24,
            vx: 0, vy: 0,
            speed: 0.85, maxSpeed: 6.5, friction: 0.85,
            jumpPower: -13, gravity: 0.65,
            grounded: false, color: '#38bdf8'
        };

        function buildLevel(level) {
            platforms = [];
            lasers = []; // Clear attacks on new level
            
            // Start platform
            platforms.push({ x: 100, y: canvas.height / 2 + 100, w: 150, h: 20, type: 'start', color: '#facc15' });
            
            player.x = 150;
            player.y = canvas.height / 2;
            player.vx = 0;
            player.vy = 0;

            if (level === 1000) {
                // LEVEL 1000: GIANT TOWER GAUNTLET
                let currentX = 250;
                let currentY = canvas.height / 2 + 100;
                
                for(let i = 0; i < 30; i++) {
                    currentX += 120 + Math.random() * 80;
                    currentY -= 60 + Math.random() * 60; // Constantly building upwards
                    platforms.push({ x: currentX, y: currentY, w: 60, h: 20, type: 'normal', color: '#ef4444' });
                }
                platforms.push({ x: currentX + 150, y: currentY, w: 200, h: 20, type: 'goal', color: '#4ade80' });
            } else {
                // Procedural generation for 1-999
                const numJumps = 3 + Math.floor(level * 0.05); // Scales slower to fit 1000 levels
                let currentX = 250;
                let currentY = canvas.height / 2 + 100;

                for (let i = 0; i < numJumps; i++) {
                    let gapX = 80 + (level * 0.1) + (Math.random() * 70);
                    let gapY = (Math.random() * 180) - 90; 
                    let platW = Math.max(20, 120 - (level * 0.08)); // Shrinks platforms

                    currentX += gapX;
                    currentY += gapY;

                    // Keep platforms in reasonable vertical bounds relative to start
                    if (currentY > canvas.height - 50) currentY = canvas.height - 50;
                    if (currentY < 150) currentY = 150;

                    platforms.push({ x: currentX, y: currentY, w: platW, h: 20, type: 'normal', color: '#cbd5e1' });
                    currentX += platW;
                }
                
                let finalGap = 100 + (level * 0.1);
                platforms.push({ x: currentX + finalGap, y: currentY, w: 100, h: 20, type: 'goal', color: '#4ade80' });
            }

            levelUI.innerText = `Level ${level} / 1000`;
        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        function die() {
            buildLevel(currentLevel); // Reset
        }

        function updatePhysics() {
            // Horizontal Movement
            if (keys.a) player.vx -= player.speed;
            if (keys.d) player.vx += player.speed;
            player.vx *= player.friction;
            
            player.vx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.vx));
            player.x += player.vx;

            // Horizontal Collisions
            for (let p of platforms) {
                if (isColliding(player, p)) {
                    if (player.vx > 0) player.x = p.x - player.w;
                    else if (player.vx < 0) player.x = p.x + p.w;
                    player.vx = 0;
                }
            }

            // Vertical Movement
            player.vy += player.gravity;
            player.y += player.vy;
            player.grounded = false;

            // Vertical Collisions
            for (let p of platforms) {
                if (isColliding(player, p)) {
                    if (player.vy > 0) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                        
                        if (p.type === 'goal') {
                            currentLevel++;
                            if (currentLevel > 1000) {
                                isPlaying = false;
                                victoryScreen.style.display = 'flex';
                            } else {
                                buildLevel(currentLevel);
                            }
                            return; 
                        }
                    } else if (player.vy < 0) {
                        player.y = p.y + p.h;
                        player.vy = 0;
                    }
                }
            }

            // Single Jump (Strictly requires grounding)
            if (player.grounded && (keys.w || keys.space)) {
                player.vy = player.jumpPower;
                player.grounded = false;
            }

            // Fall off screen death
            if (player.y > canvas.height + 500 || player.y - cameraYOffset > canvas.height + 100) {
                die();
            }
        }

        function updateBossAttacks() {
            // Spawn logic: Faster spawn rate at higher levels
            let baseRate = 0.005;
            let levelRate = currentLevel * 0.0001;
            let spawnChance = Math.min(baseRate + levelRate, 0.08);

            // Level 1000 is absolute bullet hell
            if (currentLevel === 1000) spawnChance = 0.15;

            if (Math.random() < spawnChance) {
                // Target player or random area ahead
                let targetX = player.x + (Math.random() * 400 - 100);
                lasers.push({
                    x: targetX,
                    w: 40 + Math.random() * 40,
                    timer: 70, // Frames of warning
                    activeTimer: 15, // Frames of actual damage
                    state: 'warning'
                });
            }

            // Update lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                if (l.state === 'warning') {
                    l.timer--;
                    if (l.timer <= 0) l.state = 'active';
                } else if (l.state === 'active') {
                    l.activeTimer--;
                    if (l.activeTimer <= 0) {
                        lasers.splice(i, 1);
                        continue;
                    }
                    
                    // Collision with player (infinite vertical beam)
                    if (player.x < l.x + l.w && player.x + player.w > l.x) {
                        die();
                    }
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Camera handling (Track X and Y for the Level 1000 tower climb)
            let targetCameraX = player.x - canvas.width / 3;
            cameraX += (targetCameraX - cameraX) * 0.1;
            
            let targetCameraY = player.y - canvas.height / 1.5;
            // Only scroll Y up, not down, or strictly follow
            cameraYOffset += (targetCameraY - cameraYOffset) * 0.1;

            // Draw Boss (Giant Orange fixed at top center of screen)
            ctx.fillStyle = '#ff8800';
            ctx.beginPath();
            ctx.arc(canvas.width / 2, 0, 150, 0, Math.PI * 2);
            ctx.fill();
            
            // Boss Eyes (staring down)
            ctx.fillStyle = '#111';
            let eyeOffsetX = (player.x - (cameraX + canvas.width/2)) * 0.05; // Eyes follow you slightly
            ctx.beginPath();
            ctx.arc(canvas.width / 2 - 40 + eyeOffsetX, 60, 15, 0, Math.PI * 2);
            ctx.arc(canvas.width / 2 + 40 + eyeOffsetX, 60, 15, 0, Math.PI * 2);
            ctx.fill();

            // Draw Lasers
            for (let l of lasers) {
                let screenX = l.x - cameraX;
                if (l.state === 'warning') {
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.2)'; // Faint red
                    ctx.fillRect(screenX, 0, l.w, canvas.height);
                    
                    // Draw outline to make bounds clear
                    ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(screenX, 0, l.w, canvas.height);
                } else if (l.state === 'active') {
                    ctx.fillStyle = '#ef4444'; // Solid deadly red
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ef4444';
                    ctx.fillRect(screenX, 0, l.w, canvas.height);
                    ctx.shadowBlur = 0; // reset
                }
            }

            // Draw Platforms
            for (let p of platforms) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - cameraX, p.y - cameraYOffset, p.w, p.h);
            }

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x - cameraX, player.y - cameraYOffset, player.w, player.h);
            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            if (!isPlaying) return;
            updatePhysics();
            updateBossAttacks();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
