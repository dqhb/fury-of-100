<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fury of 1000</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; user-select: none; }
        canvas { display: block; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; box-sizing: border-box; text-transform: uppercase;
        }

        #top-bar { display: flex; justify-content: space-between; align-items: flex-start; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        h1 { margin: 0; font-size: 2.5rem; color: #ff8800; letter-spacing: 2px; text-shadow: 0 0 20px #ff8800;}
        #level-display { font-size: 1.5rem; color: #facc15; text-shadow: 0 0 10px #facc15;}

        #menu, #victory {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto; z-index: 10;
        }

        #menu h2, #victory h2 { font-size: 4rem; color: #ff8800; margin: 0 0 20px 0; text-shadow: 0 0 20px #ff8800; }
        #victory h2 { color: #4ade80; text-shadow: 0 0 30px #4ade80; font-size: 3rem; text-align: center; }
        p { color: #94a3b8; font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 1px; }
        .controls-text { color: #fff; font-weight: bold; }

        button {
            background: #ff8800; color: #0f172a; border: none; padding: 15px 40px;
            font-size: 1.5rem; font-weight: bold; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 0 15px #ff8800; transition: transform 0.1s;
        }
        button:hover { transform: scale(1.05); background: #ffaa33; }
        
        #victory { display: none; z-index: 20; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="top-bar">
            <h1>fury of 1000</h1>
            <div id="level-display">Level 1 / 1000</div>
        </div>
    </div>

    <div id="menu">
        <h2>THE ORANGE WATCHES</h2>
        <p><span class="controls-text">A / D</span> Move | <span class="controls-text">W / SPACE</span> Single Jump | Dodge the <span style="color:#ef4444; font-weight:bold;">Red Lasers</span></p>
        <button id="start-btn">BEGIN RUN</button>
    </div>

    <div id="victory">
        <h2>THE ORANGE IS DEFEATED!</h2>
        <p>You survived all 1000 levels.</p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const startBtn = document.getElementById('start-btn');
        const levelUI = document.getElementById('level-display');
        const victoryScreen = document.getElementById('victory');

        let isPlaying = false;
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        startBtn.addEventListener('click', () => {
            menu.style.display = 'none';
            isPlaying = true;
            buildLevel(currentLevel);
            gameLoop();
        });

        const keys = { a: false, d: false, w: false, space: false };
        window.addEventListener('keydown', e => { 
            let key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = true; 
            if(e.code === 'Space') keys.space = true; 
        });
        window.addEventListener('keyup', e => { 
            let key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = false; 
            if(e.code === 'Space') keys.space = false; 
        });

        let currentLevel = 1;
        let platforms = [];
        let lasers = [];
        let cameraX = 0;
        let cameraY = 0;
        let deathY = 0; // Tracks the lowest point of the generated room

        const player = {
            x: 0, y: 0, w: 24, h: 24,
            vx: 0, vy: 0,
            speed: 0.9, maxSpeed: 7, friction: 0.85,
            jumpPower: -13.5, gravity: 0.65,
            grounded: false, color: '#38bdf8'
        };

        function buildLevel(level) {
            platforms = [];
            lasers = [];
            
            let curX = 100;
            let curY = 0;
            
            // Start platform
            platforms.push({ x: curX, y: curY + 100, w: 200, h: 20, type: 'start', color: '#facc15' });
            
            player.x = curX + 50;
            player.y = curY;
            player.vx = 0;
            player.vy = 0;

            // Massive rooms: At least 20 jumps, scales up to 40 later on
            let numJumps = 20 + Math.floor(level * 0.05);
            let lowestY = curY + 100;

            // Difficulty modifier (0.0 to 1.0 based on level progress)
            let diff = Math.min(level / 800, 1);

            for (let i = 0; i < numJumps; i++) {
                let jumpPattern = Math.floor(Math.random() * 4);
                let gapX, gapY, platW;

                if (jumpPattern === 0) {
                    // Stairs Up: Steep vertical climbs
                    gapX = 80 + Math.random() * 40;
                    gapY = -70 - Math.random() * 50;
                    platW = 100 - (diff * 40);
                } else if (jumpPattern === 1) {
                    // Stairs Down: Controlled drops
                    gapX = 100 + Math.random() * 60;
                    gapY = 80 + Math.random() * 80;
                    platW = 100 - (diff * 40);
                } else if (jumpPattern === 2) {
                    // Long Horizontal Stretch
                    gapX = 140 + (diff * 50);
                    gapY = (Math.random() * 40) - 20;
                    platW = 120 - (diff * 50);
                } else {
                    // Stepping Stones (tight platforms)
                    gapX = 70 + Math.random() * 30;
                    gapY = (Math.random() * 80) - 40;
                    platW = Math.max(20, 60 - (diff * 30));
                }

                curX += gapX;
                curY += gapY;
                
                if (curY > lowestY) lowestY = curY; // Update death boundary

                platforms.push({ x: curX, y: curY, w: Math.max(20, platW), h: 20, type: 'normal', color: '#cbd5e1' });
                curX += Math.max(20, platW);
            }
            
            // Goal platform
            platforms.push({ x: curX + 120, y: curY, w: 200, h: 20, type: 'goal', color: '#4ade80' });
            
            deathY = lowestY + 600; // Give some buffer below the lowest platform
            levelUI.innerText = `Level ${level} / 1000`;
        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        function die() {
            buildLevel(currentLevel); // Reset
        }

        function updatePhysics() {
            // Horizontal Movement
            if (keys.a) player.vx -= player.speed;
            if (keys.d) player.vx += player.speed;
            player.vx *= player.friction;
            
            player.vx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.vx));
            player.x += player.vx;

            // Horizontal Collisions
            for (let p of platforms) {
                if (isColliding(player, p)) {
                    if (player.vx > 0) player.x = p.x - player.w;
                    else if (player.vx < 0) player.x = p.x + p.w;
                    player.vx = 0;
                }
            }

            // Vertical Movement
            player.vy += player.gravity;
            player.y += player.vy;
            player.grounded = false;

            // Vertical Collisions
            for (let p of platforms) {
                if (isColliding(player, p)) {
                    if (player.vy > 0) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                        
                        if (p.type === 'goal') {
                            currentLevel++;
                            if (currentLevel > 1000) {
                                isPlaying = false;
                                victoryScreen.style.display = 'flex';
                            } else {
                                buildLevel(currentLevel);
                            }
                            return; 
                        }
                    } else if (player.vy < 0) {
                        player.y = p.y + p.h;
                        player.vy = 0;
                    }
                }
            }

            // Single Jump (Strictly requires grounding)
            if (player.grounded && (keys.w || keys.space)) {
                player.vy = player.jumpPower;
                player.grounded = false;
            }

            // Fall off the absolute bottom of the generated room
            if (player.y > deathY) {
                die();
            }
        }

        function updateBossAttacks() {
            let baseRate = 0.005;
            let levelRate = currentLevel * 0.0001;
            let spawnChance = Math.min(baseRate + levelRate, 0.12);

            if (currentLevel === 1000) spawnChance = 0.2; // Bullet hell for final level

            if (Math.random() < spawnChance) {
                // Lasers spawn in world space relative to player
                let targetWorldX = player.x + (Math.random() * 600 - 300);
                lasers.push({
                    worldX: targetWorldX,
                    w: 40 + Math.random() * 50,
                    timer: 60, // Frames of warning
                    activeTimer: 15, // Frames of actual damage
                    state: 'warning'
                });
            }

            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                if (l.state === 'warning') {
                    l.timer--;
                    if (l.timer <= 0) l.state = 'active';
                } else if (l.state === 'active') {
                    l.activeTimer--;
                    if (l.activeTimer <= 0) {
                        lasers.splice(i, 1);
                        continue;
                    }
                    
                    if (player.x < l.worldX + l.w && player.x + player.w > l.worldX) {
                        die(); // Hit by laser
                    }
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // True 2D Smooth Camera (Follows X and Y)
            let targetCameraX = player.x - canvas.width / 2;
            let targetCameraY = player.y - canvas.height / 1.6; // Keep player slightly lower on screen
            
            cameraX += (targetCameraX - cameraX) * 0.1;
            cameraY += (targetCameraY - cameraY) * 0.1;

            // --- UI LAYER (Drawn without camera offset) ---
            
            // Draw Boss (Giant Orange fixed at top center of screen)
            ctx.fillStyle = '#ff8800';
            ctx.beginPath();
            ctx.arc(canvas.width / 2, 0, 150, 0, Math.PI * 2);
            ctx.fill();
            
            // Boss Eyes (staring down, tracking player X)
            ctx.fillStyle = '#111';
            let eyeOffsetX = (player.x - (cameraX + canvas.width/2)) * 0.05; 
            ctx.beginPath();
            ctx.arc(canvas.width / 2 - 40 + eyeOffsetX, 60, 15, 0, Math.PI * 2);
            ctx.arc(canvas.width / 2 + 40 + eyeOffsetX, 60, 15, 0, Math.PI * 2);
            ctx.fill();

            // Draw Lasers (Locked to world X, but span entire screen Y)
            for (let l of lasers) {
                let screenX = l.worldX - cameraX;
                if (l.state === 'warning') {
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.15)'; 
                    ctx.fillRect(screenX, 0, l.w, canvas.height);
                    
                    ctx.strokeStyle = 'rgba(239, 68, 68, 0.6)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(screenX, 0, l.w, canvas.height);
                } else if (l.state === 'active') {
                    ctx.fillStyle = '#ef4444'; 
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ef4444';
                    ctx.fillRect(screenX, 0, l.w, canvas.height);
                    ctx.shadowBlur = 0; 
                }
            }

            // --- WORLD LAYER (Drawn with camera offset) ---

            // Draw Platforms
            for (let p of platforms) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - cameraX, p.y - cameraY, p.w, p.h);
            }

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x - cameraX, player.y - cameraY, player.w, player.h);
            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            if (!isPlaying) return;
            updatePhysics();
            updateBossAttacks();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
