<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fury of one hundred</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; user-select: none; }
        canvas { display: block; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; box-sizing: border-box; text-transform: uppercase;
        }

        #top-bar { display: flex; justify-content: space-between; align-items: flex-start; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        h1 { margin: 0; font-size: 2.5rem; color: #38bdf8; letter-spacing: 2px; text-shadow: 0 0 15px #38bdf8;}
        #level-display { font-size: 1.5rem; color: #facc15; text-shadow: 0 0 10px #facc15;}

        #menu, #victory {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto; z-index: 10;
        }

        #menu h2, #victory h2 { font-size: 4rem; color: #38bdf8; margin: 0 0 20px 0; text-shadow: 0 0 20px #38bdf8; }
        #victory h2 { color: #4ade80; text-shadow: 0 0 30px #4ade80; }
        p { color: #94a3b8; font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 1px; }
        .controls-text { color: #fff; font-weight: bold; }

        button {
            background: #38bdf8; color: #0f172a; border: none; padding: 15px 40px;
            font-size: 1.5rem; font-weight: bold; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 0 15px #38bdf8; transition: transform 0.1s;
        }
        button:hover { transform: scale(1.05); background: #7dd3fc; }
        
        #victory { display: none; z-index: 20; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="top-bar">
            <h1>Neon Run</h1>
            <div id="level-display">Level 1 / 100</div>
        </div>
    </div>

    <div id="menu">
        <h2>READY TO JUMP?</h2>
        <p><span class="controls-text">A / D</span> to Move | <span class="controls-text">W / SPACE</span> to Jump</p>
        <button id="start-btn">PLAY</button>
    </div>

    <div id="victory">
        <h2>100 LEVELS CLEARED!</h2>
        <p>You are a 2D platforming master.</p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const startBtn = document.getElementById('start-btn');
        const levelUI = document.getElementById('level-display');
        const victoryScreen = document.getElementById('victory');

        let isPlaying = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        startBtn.addEventListener('click', () => {
            menu.style.display = 'none';
            isPlaying = true;
            buildLevel(currentLevel);
            gameLoop();
        });

        const keys = { a: false, d: false, w: false, space: false };
        window.addEventListener('keydown', e => { 
            let key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = true; 
            if(e.code === 'Space') keys.space = true; 
        });
        window.addEventListener('keyup', e => { 
            let key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = false; 
            if(e.code === 'Space') keys.space = false; 
        });

        let currentLevel = 1;
        let platforms = [];
        let cameraX = 0;

        const player = {
            x: 0, y: 0, w: 24, h: 24,
            vx: 0, vy: 0,
            speed: 0.8, maxSpeed: 6, friction: 0.85,
            jumpPower: -12, gravity: 0.6,
            grounded: false, color: '#ec4899'
        };

        function buildLevel(level) {
            platforms = [];
            
            // Start platform
            platforms.push({ x: 100, y: canvas.height / 2 + 100, w: 150, h: 20, type: 'start', color: '#facc15' });
            
            player.x = 150;
            player.y = canvas.height / 2;
            player.vx = 0;
            player.vy = 0;

            // Difficulty scaling
            const numJumps = 3 + Math.floor(level * 0.3);
            let currentX = 250;
            let currentY = canvas.height / 2 + 100;

            for (let i = 0; i < numJumps; i++) {
                // Gaps get wider, platforms get smaller as level increases
                let gapX = 80 + (level * 2.5) + (Math.random() * 60);
                let gapY = (Math.random() * 160) - 80; 
                let platW = Math.max(30, 120 - (level * 0.8));

                currentX += gapX;
                currentY += gapY;

                // Keep platforms roughly centered on screen vertically
                if (currentY > canvas.height - 100) currentY = canvas.height - 100;
                if (currentY < 200) currentY = 200;

                platforms.push({ x: currentX, y: currentY, w: platW, h: 20, type: 'normal', color: '#38bdf8' });
                currentX += platW;
            }

            // Goal platform
            let finalGap = 100 + (level * 2);
            platforms.push({ x: currentX + finalGap, y: currentY, w: 100, h: 20, type: 'goal', color: '#4ade80' });

            levelUI.innerText = `Level ${level} / 100`;
        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        function updatePhysics() {
            // Horizontal Movement
            if (keys.a) player.vx -= player.speed;
            if (keys.d) player.vx += player.speed;
            player.vx *= player.friction;
            
            // Clamp speed
            player.vx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.vx));
            player.x += player.vx;

            // Horizontal Collisions
            for (let p of platforms) {
                if (isColliding(player, p)) {
                    if (player.vx > 0) player.x = p.x - player.w; // Hit right side
                    else if (player.vx < 0) player.x = p.x + p.w; // Hit left side
                    player.vx = 0;
                }
            }

            // Vertical Movement
            player.vy += player.gravity;
            player.y += player.vy;
            player.grounded = false;

            // Vertical Collisions
            for (let p of platforms) {
                if (isColliding(player, p)) {
                    if (player.vy > 0) { // Falling down onto platform
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                        
                        if (p.type === 'goal') {
                            currentLevel++;
                            if (currentLevel > 100) {
                                isPlaying = false;
                                victoryScreen.style.display = 'flex';
                            } else {
                                buildLevel(currentLevel);
                            }
                            return; // Stop processing physics for this frame to prevent glitches on level load
                        }
                    } else if (player.vy < 0) { // Hitting head on bottom of platform
                        player.y = p.y + p.h;
                        player.vy = 0;
                    }
                }
            }

            // Jumping
            if (player.grounded && (keys.w || keys.space)) {
                player.vy = player.jumpPower;
                player.grounded = false;
            }

            // Death / Fall off screen
            if (player.y > canvas.height + 200) {
                buildLevel(currentLevel); // Restart current level
            }
        }

        function draw() {
            // Clear screen
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Smooth Camera follow
            let targetCameraX = player.x - canvas.width / 3;
            cameraX += (targetCameraX - cameraX) * 0.1;

            // Draw Platforms
            for (let p of platforms) {
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color;
                ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
            }

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);

            // Reset shadow for performance
            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            if (!isPlaying) return;
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
